version: 1
document:
  id: "rfc"
  title: "Glint RFC"
  normalization: "NFC"
  case_sensitive: false
  strict_order: true
  allow_extra_sections: false

sections:
  - name: "Phase 1: Scope & Goals"
    heading:
      level: 2
      text: "Phase 1: Scope & Goals"
    content:
      sequence:
        - type: "strong_paragraph"
          required: true
          description: "One line, bolded section title"
        - type: "list"
          required: true
          description: "Bulleted list of scope items"
          items:
            min: 1
            max: 10
            of:
              type: "text"
              min_len: 3
              max_len: 200
        - type: "list"
          required: true
          description: "Goals and Non-Goals list"
          items:
            min: 1
            of:
              type: "regex"
              pattern: "^(Goal|Non-Goal):\\s+.+$"

  - name: "Phase 2: Implementation"
    requires:
      - "Phase 1: Scope & Goals"
    heading:
      level: 2
      text: "Phase 2: Implementation"
    content:
      sequence:
        - type: "list"
          description: "Key design decisions"
          items:
            min: 1
            of:
              type: "text"
              min_len: 3
        - type: "list"
          description: "Known risks as a list"
          items:
            min: 1
            of:
              type: "regex"
              pattern: "^Risk:\\s+.+$"

  - name: "Phase 3: Release & Review"
    requires:
      - "Phase 2: Implementation"
    heading:
      level: 2
      text: "Phase 3: Release & Review"
    content:
      sequence:
        - type: "strong_paragraph"
          description: "Release Intent title in bold"
        - type: "list"
          description: "Release stage checkboxes"
          items:
            min: 1
            of:
              type: "regex"
              pattern: "^(Preview|Beta|GA):\\s+(Yes|No)$"
        - type: "list"
          description: "Reviewers as email addresses"
          items:
            min: 1
            of:
              type: "email"
