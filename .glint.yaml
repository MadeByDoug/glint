# .glint/config.yaml
linter:
  version: 1
  rules:
    - id: STRUCT-ROOT
      selector:
        kind: folder
        path:
          - "^[^/]+$"
      apply:
        checks:
          - folderName:
              severity: error
              allow:
                - "^\\.git$"
                - "^\\.glint$"
                - "^\\.github$"
                - "^cmd$"
                - "^internal$"
                - "^rfcs$"
                - "^schemas$"
                - "^docs$"
              disallow:
                - ".*"
              message: "Top-level directories must align with the glint layout."

    - id: STRUCT-CMD
      selector:
        kind: folder
        path:
          - "^cmd/[^/]+$"
      apply:
        checks:
          - folderName:
              severity: error
              allow:
                - "^glint$"
              disallow:
                - ".*"
              message: "Only the canonical 'glint' command is allowed under cmd/."

    - id: STRUCT-INTERNAL
      selector:
        kind: folder
        path:
          - "^internal/[^/]+$"
      apply:
        checks:
          - folderName:
              severity: error
              allow:
                - "^app$"
              disallow:
                - ".*"
              message: "internal/ should only contain the app layer and shared markdown tooling."

    - id: STRUCT-APP
      selector:
        kind: folder
        path:
          - "^internal/app/[^/]+$"
      apply:
        checks:
          - folderName:
              severity: error
              allow:
                - "^config$"
                - "^infra$"
                - "^lint$"
                - "^runtime$"
              disallow:
                - ".*"
              message: "internal/app/ must only contain config, infra, and lint packages."

    - id: STRUCT-APP-CONFIG
      selector:
        kind: folder
        path:
          - "^internal/app/config/[^/]+$"
      apply:
        checks:
          - folderName:
              severity: error
              allow:
                - "^model$"
              disallow:
                - ".*"
              message: "internal/app/config/ only exposes the model package."

    - id: STRUCT-APP-INFRA
      selector:
        kind: folder
        path:
          - "^internal/app/infra/[^/]+$"
      apply:
        checks:
          - folderName:
              severity: error
              allow:
                - "^output$"
              disallow:
                - ".*"
              message: "internal/app/infra/ only contains the output subsystem."

    - id: STRUCT-INFRA-OUTPUT
      selector:
        kind: folder
        path:
          - "^internal/app/infra/output/[^/]+$"
      apply:
        checks:
          - folderName:
              severity: error
              allow:
                - "^log$"
                - "^reporting$"
              disallow:
                - ".*"
              message: "internal/app/infra/output/ exposes log and reporting packages only."

    - id: STRUCT-LINT
      selector:
        kind: folder
        path:
          - "^internal/app/lint/[^/]+$"
      apply:
        checks:
          - folderName:
              severity: error
              allow:
                - "^checks$"
                - "^fs$"
                - "^parsers$"
                - "^plan$"
                - "^util$"
              disallow:
                - ".*"
              message: "internal/app/lint/ must only include the canonical lint packages."

    - id: STRUCT-LINT-CHECKS
      selector:
        kind: folder
        path:
          - "^internal/app/lint/checks/[^/]+$"
      apply:
        checks:
          - folderName:
              severity: error
              allow:
                - "^folder$"
                - "^file$"
                - "^tests$"
              disallow:
                - ".*"
              message: "internal/app/lint/checks/ only has folder, file, and tests categories."

    - id: STRUCT-LINT-CHECKS-TESTS
      selector:
        kind: folder
        path:
          - "^internal/app/lint/checks/tests/[^/]+$"
      apply:
        checks:
          - folderName:
              severity: error
              allow:
                - "^folder$"
                - "^file$"
                - "^selector$"
                - "^testutil$"
              disallow:
                - ".*"
              message: "internal/app/lint/checks/tests/ contains folder, file, selector, and testutil helpers."

