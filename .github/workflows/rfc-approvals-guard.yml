name: rfc-approvals-guard

on:
  pull_request:
    paths:
      - 'rfcs/**/*.md'

permissions: read-all

jobs:
  guard:
    runs-on: ubuntu-latest
    steps:
      - name: Inspect RFC approvals hygiene
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            const files = await github.paginate(github.rest.pulls.listFiles, { owner, repo, pull_number: pr.number, per_page: 100 });
            const labels = new Set((pr.labels || []).map(l => l.name));

            const APPROVAL_HDR_RE = /###\s+Approvals\s*\(Phase\s*(1|2)\)/i;
            const STATUS_HDR_RE = /###\s+Status/i;
            const STATUS_ACCEPTED_RE = /^\s*-\s*Accepted\s*$/mi;

            let warned = false;

            for (const f of files) {
              if (!f.filename.startsWith('rfcs/') || !f.filename.endsWith('.md')) continue;

              // Try to detect if this file modifies approvals and possibly more.
              const patch = f.patch || '';
              const lines = patch.split(/\r?\n/);
              let modifiesApprovals = false;
              let modifiesOutsideApprovals = false;
              for (const ln of lines) {
                if (!ln.startsWith('+') && !ln.startsWith('-')) continue;
                if (/^\+\+\+|^---|^@@/.test(ln)) continue;
                const t = ln.slice(1);
                if (APPROVAL_HDR_RE.test(t) || STATUS_HDR_RE.test(t)) { modifiesApprovals = true; continue; }
                // Allow bullet lines (approval entries), simple status entries, and whitespace-only
                if (/^\s*$/.test(t)) continue;
                if (/^\s*[-*]\s/.test(t)) { modifiesApprovals = true; continue; }
                if (/^\s*(Pending|Accepted)\s*$/i.test(t)) { modifiesApprovals = true; continue; }
                // Anything else is considered outside-approvals content
                modifiesOutsideApprovals = true;
              }

              if (modifiesApprovals && modifiesOutsideApprovals) {
                core.warning(`${f.filename}: Approval changes detected along with other content changes. Prefer dedicated approval commits that only edit the Approvals/Status sections.`);
                warned = true;
              }

              // Load HEAD content to check Status vs Approvals counts.
              try {
                const res = await github.rest.repos.getContent({ owner, repo, path: f.filename, ref: pr.head.sha });
                const content = Buffer.from(res.data.content, 'base64').toString('utf8');
                const hasApprovalEntries = /###\s+Approvals\s*\(Phase\s*\d\)[\s\S]*?\n-\s*@/mi.test(content);
                const statusAccepted = STATUS_ACCEPTED_RE.test(content);
                if (hasApprovalEntries && !statusAccepted) {
                  core.warning(`${f.filename}: Approvals present while Status is not 'Accepted'. Set Status to 'Accepted' when locking a phase, or clear Approvals when returning to 'Pending'.`);
                  warned = true;
                }
              } catch (e) {
                // Ignore content load failures for non-head states
              }
            }

            if (!warned && (labels.has('ready-for-approvals') || labels.has('ready-to-approve'))) {
              // If explicitly marked ready for approvals, nudge if no approvals detected.
              const rfcFiles = files.filter(f => f.filename.startsWith('rfcs/') && f.filename.endsWith('.md'));
              if (rfcFiles.length) {
                let approvalsFound = false;
                for (const f of rfcFiles) {
                  try {
                    const res = await github.rest.repos.getContent({ owner, repo, path: f.filename, ref: pr.head.sha });
                    const content = Buffer.from(res.data.content, 'base64').toString('utf8');
                    if (/###\s+Approvals\s*\(Phase\s*\d\)[\s\S]*?\n-\s*@/mi.test(content)) { approvalsFound = true; break; }
                  } catch {}
                }
                if (!approvalsFound) {
                  core.warning(`PR labeled ready-for-approvals but no approval entries detected yet in RFC files.`);
                }
              }
            }
