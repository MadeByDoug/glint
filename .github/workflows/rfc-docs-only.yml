name: rfc-docs-only

on:
  pull_request:
    branches: [ main ]
    paths:
      - 'rfcs/**/*.md'

permissions:
  contents: read
  pull-requests: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Check if PR only updates its matching RFC file
        id: verify
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const files = await github.paginate(github.rest.pulls.listFiles, { owner, repo, pull_number: pr.number, per_page: 100 });
            const changed = files.map(f => f.filename);
            let safe = false;
            // RFC draft-docs-only if: all changed files are rfcs/**/*.md, all are *-DRAFT.md,
            // and they all refer to the same RFC id (YYYY-mon.rfc#)
            const rfcMd = changed.filter(p => p.startsWith('rfcs/') && p.endsWith('.md'));
            if (rfcMd.length === changed.length && rfcMd.length > 0) {
              const idSet = new Set();
              for (const p of rfcMd) {
                if (!/-draft\.md$/i.test(p)) { safe = false; break; }
                const base = p.split('/').pop();
                const m = base.match(/^(\d{4})-([a-z]{3})\.rfc(\d+)/);
                if (!m) { safe = false; break; }
                idSet.add(`${m[1]}-${m[2]}.rfc${m[3]}`);
                safe = true;
              }
              if (idSet.size !== 1) safe = false;
            }
            if (safe) {
              core.notice('RFC-docs-only: safe to merge to main.');
              // Add label to help visibility
              try {
                await github.rest.issues.addLabels({ owner, repo, issue_number: pr.number, labels: ['rfc:doc-only'] });
              } catch (e) { /* ignore */ }
            } else {
              core.notice('Not draft RFC-docs-only (found other changes or non-DRAFT file name).');
            }
            core.setOutput('safe', String(safe));
