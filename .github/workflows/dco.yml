name: dco

on:
  pull_request:
    branches: [ main ]
    types: [ opened, synchronize, reopened, ready_for_review ]

permissions: read-all

jobs:
  check-dco:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Enforce DCO for code PRs to main
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const pr = context.payload.pull_request;
            const number = pr.number;

            // Gather changed files
            const files = await github.paginate(github.rest.pulls.listFiles, { owner, repo, pull_number: number, per_page: 100 });
            const changed = files.map(f => f.filename);

            // Skip DCO for RFC docs-only PRs
            const isRFCDocsOnly = changed.length > 0 && changed.every(p => p.startsWith('rfcs/') && p.endsWith('.md'));
            if (isRFCDocsOnly) {
              core.notice('RFC docs-only PR; skipping DCO check');
              return;
            }

            // Otherwise, require DCO
            const commits = await github.paginate(github.rest.pulls.listCommits, { owner, repo, pull_number: number, per_page: 100 });
            let unsigned = [];
            for (const c of commits) {
              const msg = c.commit && c.commit.message ? c.commit.message : '';
              if (!/^Signed-off-by:/mi.test(msg)) {
                unsigned.push(c.sha.substring(0, 7));
              }
            }

            // Allow a maintainer workflow: if commits lack DCO, accept a DCO line in PR body for squash-merge
            if (unsigned.length > 0) {
              const body = (pr.body || '').trim();
              const hasPRSignoff = /^Signed-off-by:\s+.+<.+>\s*$/mi.test(body);
              if (!hasPRSignoff) {
                core.error(`DCO: commits missing sign-off: ${unsigned.join(', ')}`);
                core.error('Either add sign-offs to each commit (`git commit -s`) or add a `Signed-off-by: Name <email>` line to the PR description and squash-merge including the PR description.');
                core.setFailed('DCO check failed');
                return;
              }
              core.notice('PR contains a Signed-off-by line; proceed with squash merge including PR title/description.');
            }
            core.info('DCO check passed');
