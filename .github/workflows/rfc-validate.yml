name: rfc-validate

on:
  pull_request:
    paths:
      - 'rfcs/**/*.md'

permissions: read-all

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate RFC files and detect overlaps
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const pr = context.payload.pull_request;
            const number = pr.number;

            const pathRegex = /^rfcs\/(\d{4})\/([A-Za-z]{3})\/(.+\.md)$/;
            // New RFC filename pattern: YYYY-mon.rfc#(-DRAFT).md
            const fileRegex = /^(\d{4})-([a-z]{3})\.rfc(\d+)(-DRAFT)?\.md$/;

            const files = await github.paginate(github.rest.pulls.listFiles, { owner, repo, pull_number: number, per_page: 100 });
            const changedAll = files.map(f => f.filename);
            const rfcFiles = changedAll.filter(p => p.startsWith('rfcs/') && p.endsWith('.md'));

            if (rfcFiles.length === 0) {
              core.info('No RFC files changed.');
              return;
            }

            let failed = false;

            // Load active index from main (if exists)
            let activeIndex = [];
            try {
              const idx = await github.rest.repos.getContent({ owner, repo, ref: 'heads/main', path: 'rfcs/active-index.json' });
              const buf = Buffer.from(idx.data.content, 'base64').toString('utf8');
              activeIndex = JSON.parse(buf);
            } catch (e) {
              core.info('active-index.json not found on main (yet).');
            }

            const fs = require('fs');

            function parseFrontMatter(text) {
              const meta = { touched_paths: [], dependencies: [] };
              if (!text.startsWith('---\n')) return meta;
              const end = text.indexOf('\n---', 4);
              if (end <= 0) return meta;
              const fm = text.slice(4, end).split(/\r?\n/);
              let currentArr = null;
              for (let raw of fm) {
                const line = raw.trim();
                if (!line) continue;
                if (/^[A-Za-z_][A-Za-z0-9_]*:\s*$/.test(line)) {
                  const key = line.slice(0, line.indexOf(':')).trim();
                  meta[key] = [];
                  currentArr = key;
                } else if (line.startsWith('- ')) {
                  if (currentArr) meta[currentArr].push(line.slice(2).trim());
                } else if (line.includes(':')) {
                  const [k, v] = line.split(':', 2).map(s => s.trim());
                  meta[k] = v.replace(/^"|"$/g, '');
                  currentArr = null;
                }
              }
              return meta;
            }

            function idFromFilename(name) {
              const mm = name.match(fileRegex);
              if (!mm) return null;
              return `${mm[1]}-${mm[2]}.rfc${mm[3]}`;
            }

            const headRef = pr.head.ref || '';
            const baseRef = pr.base.ref || '';

            for (const p of rfcFiles) {
              if (!pathRegex.test(p)) {
                core.error(`${p}: must be under rfcs/YYYY/Mon/`);
                failed = true;
                continue;
              }
              const parts = p.split('/');
              const fname = parts[parts.length - 1];
              const id = idFromFilename(fname);
              if (!id) {
                core.error(`${p}: filename must match YYYY-Mon-###-short-desc(-DRAFT).md`);
                failed = true;
                continue;
              }
              // Read file to parse meta
              let content = '';
              try { content = fs.readFileSync(p, 'utf8'); } catch (_) {}
              const meta = parseFrontMatter(content);
              // Detect overlaps (best-effort)
              if (Array.isArray(meta.touched_paths) && meta.touched_paths.length && activeIndex.length) {
                const overlaps = activeIndex.filter(r => r.id !== id && r.status !== 'done' && Array.isArray(r.touched_paths) && r.touched_paths.length).filter(r => {
                  return r.touched_paths.some(a => meta.touched_paths.some(b => a.split('*')[0] && b.includes(a.split('*')[0])));
                });
                if (overlaps.length) {
                  core.warning(`${p}: potential overlaps with RFCs: ${overlaps.map(o=>o.id).join(', ')}`);
                }
              }
            }

            // If PR is from an RFC branch to main and only modifies matching DRAFT RFC docs, add a summary note
            if (baseRef === 'main') {
              const isDocOnly = rfcFiles.length > 0 && rfcFiles.length === changedAll.length && rfcFiles.every(p => /-draft\.md$/i.test(p));
              if (isDocOnly) {
                // Attempt to extract the RFC id(s) using new pattern
                const ids = Array.from(new Set(rfcFiles.map(p => {
                  const base = p.split('/').pop();
                  const m = base.match(/^(\d{4})-([a-z]{3})\.rfc(\d+)/);
                  return m ? `${m[1]}-${m[2]}.rfc${m[3]}` : 'unknown';
                })));
                core.notice(`RFC DRAFT docs-only change${ids[0] ? ` for ${ids.join(', ')}` : ''}`);
              }
            }

            if (failed) core.setFailed('RFC validation failed.');
