name: rfc-index

on:
  push:
    branches:
      - main
      - rfc/**
      - '**.rfc*'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  build-index:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: Build active RFC index
        id: index
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            // List all branches and keep only RFC branches (legacy rfc/* or YYYY-Mon.rfcN)
            const branches = await github.paginate(github.rest.repos.listBranches, { owner, repo, per_page: 100 });
            const rfcBranches = branches
              .map(b => b.name)
              .filter(n => n.startsWith('rfc/') || /^\d{4}-[A-Za-z]{3}\.rfc\d+$/.test(n));

            const index = [];
            const pathRegex = /^rfcs\/(\d{4})\/([A-Za-z]{3})\/(.+\.md)$/;
            // New RFC filename pattern with short slug: YYYY-mon.rfc#-short-slug(-DRAFT).md (month is lowercase)
            const fileRegex = /^(\d{4})-([a-z]{3})\.rfc(\d+)-([a-z0-9][a-z0-9-]{1,50})(-DRAFT)?\.md$/;

            for (const br of rfcBranches) {
              try {
                const ref = await github.rest.git.getRef({ owner, repo, ref: `heads/${br}` });
                const tree = await github.rest.git.getTree({ owner, repo, tree_sha: ref.data.object.sha, recursive: 'true' });
                const files = (tree.data.tree || []).filter(t => t.type === 'blob' && pathRegex.test(t.path));
                for (const f of files) {
                  const m = f.path.match(pathRegex);
                  if (!m) continue;
                  const year = m[1];
                  const monDir = m[2];
                  const base = m[3];
                  const mm = base.match(fileRegex);
                  if (!mm) continue;
                  const id = `${mm[1]}-${mm[2]}.rfc${mm[3]}`; // YYYY-mon.rfc#
                  const slug = mm[4] || '';
                  const draft = !!mm[5];
                  // Fetch file content
                  const res = await github.rest.repos.getContent({ owner, repo, ref: br, path: f.path });
                  const content = Buffer.from(res.data.content, 'base64').toString('utf8');
                  // Extract title (first H1) and optional simple front matter
                  let title = '';
                  for (const line of content.split(/\r?\n/)) {
                    const l = line.trim();
                    if (l.startsWith('# ')) { title = l.replace(/^#\s+/, ''); break; }
                  }
                  // Naive front-matter between leading --- blocks
                  let meta = {};
                  if (content.startsWith('---\n')) {
                    const end = content.indexOf('\n---', 4);
                    if (end > 0) {
                      const fm = content.slice(4, end).split(/\r?\n/);
                      let currentArr = null;
                      for (let raw of fm) {
                        const line = raw.trim();
                        if (!line) continue;
                        if (/^[A-Za-z_][A-Za-z0-9_]*:\s*$/.test(line)) {
                          const key = line.slice(0, line.indexOf(':')).trim();
                          meta[key] = [];
                          currentArr = key;
                        } else if (line.startsWith('- ')) {
                          if (currentArr) meta[currentArr].push(line.slice(2).trim());
                        } else if (line.includes(':')) {
                          const [k, v] = line.split(':', 2).map(s => s.trim());
                          meta[k] = v.replace(/^"|"$/g, '');
                          currentArr = null;
                        }
                      }
                    }
                  }
                  index.push({
                    branch: br,
                    path: f.path,
                    id,
                    title,
                    slug,
                    summary: typeof meta.summary === 'string' && meta.summary ? meta.summary : '',
                    status: draft ? 'draft' : 'proposed',
                    touched_paths: Array.isArray(meta.touched_paths) ? meta.touched_paths : [],
                    dependencies: Array.isArray(meta.dependencies) ? meta.dependencies : [],
                    owners: Array.isArray(meta.owners) ? meta.owners : [],
                    updated_at: new Date().toISOString(),
                  });
                }
              } catch (e) {
                core.warning(`Failed to index branch ${br}: ${e.message}`);
              }
            }
            const fs = require('fs');
            fs.mkdirSync('rfcs', { recursive: true });
            fs.writeFileSync('rfcs/active-index.json', JSON.stringify(index, null, 2));

      - name: Open PR with updated index
        uses: peter-evans/create-pull-request@v6
        with:
          branch: chore/update-rfc-index
          base: main
          title: 'chore: update RFC index'
          commit-message: 'chore: update RFC index'
          add-paths: rfcs/active-index.json
