name: ci

on:
  pull_request:
    branches: [ main, '**.rfc*' ]
    types: [ opened, synchronize, reopened, ready_for_review ]
  push:
    branches: [ '**.rfc*' ]

permissions: read-all

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  GO_VERSION: '1.22.x'
  COVERAGE_MIN: '60'

jobs:
  build-test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
          cache-dependency-path: go.sum

      - name: Go version
        run: go version

      - name: Download modules
        run: go mod download

      - name: Tidy (no diff)
        run: |
          go mod tidy
          git diff --exit-code

      - name: Vet
        run: go vet ./...

      - name: GolangCI-Lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: latest

      - name: Test (race + coverage)
        run: go test ./... -race -shuffle=on -coverpkg=./... -coverprofile=coverage.out -covermode=atomic

      - name: List files after test
        run: |
          echo "Listing files in current directory to find coverage.out"
          ls -lR

      - name: Govulncheck
        uses: golang/govulncheck-action@v1

      - name: CLI smoke (optional)
        if: ${{ hashFiles('cmd/glint/**') != '' }}
        run: go run ./cmd/glint --help

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.out

  coverage-gate:
    needs: build-test
    runs-on: ubuntu-latest
    steps:
      - name: Setup Go (for cover tool)
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Download coverage artifact
        uses: actions/download-artifact@v4
        with:
          name: coverage

      - name: Enforce coverage threshold
        shell: bash
        run: |
          set -euo pipefail
          if [[ ! -f coverage.out ]]; then
            echo "coverage.out not found" >&2
            exit 1
          fi
          pct=$(go tool cover -func=coverage.out | awk '/total:/ {gsub(/%/, "", $3); print $3}')
          echo "Total coverage: ${pct}%"
          awk -v p="$pct" -v m="${COVERAGE_MIN}" 'BEGIN { if (p+0 < m+0) { printf("Coverage %s%% is below %s%%\n", p, m); exit 1 } else { printf("Coverage OK: %s%% >= %s%%\n", p, m) } }'
