name: release

on:
  pull_request:
    types: [closed]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.event_name == 'pull_request' && github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

jobs:
  build-and-release:
    name: Tag, build, and publish release
    runs-on: ubuntu-latest
    # Only run on:
    #  - PR merged into main from an RFC branch (head ref contains ".rfc")
    #  - Manual dispatch
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'pull_request' &&
       github.event.pull_request.merged == true &&
       github.event.pull_request.base.ref == 'main' &&
       contains(github.event.pull_request.head.ref, '.rfc'))
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine next tag (patch bump)
        id: tag
        uses: mathieudutour/github-tag-action@v6
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          default_bump: patch
          tag_prefix: v

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24.x'

      - name: Build and publish with GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: latest
          args: release --clean
        env:
          # Ensure GoReleaser uses the just-created tag/version
          GORELEASER_CURRENT_TAG: ${{ steps.tag.outputs.new_tag }}
          GORELEASER_PREVIOUS_TAG: ${{ steps.tag.outputs.previous_tag }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts to workflow run (optional)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: glint-dist
          path: dist/**
